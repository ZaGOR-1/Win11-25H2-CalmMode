name: Create Release Archive

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Use the canonical local build script as the single source of truth so the
      # CI release matches what `New-ReleaseArchive.ps1` produces locally: same
      # versioned name, same file set, same SHA256 format. pwsh is preinstalled
      # on GitHub-hosted runners.
      - name: Build release archive
        shell: pwsh
        run: ./New-ReleaseArchive.ps1

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Win11-25H2-CalmMode-v*.zip
            Win11-25H2-CalmMode-v*.zip.sha256
            checksums.txt
